env:
  id: merge-v0
  config:
    observation:
      type: Kinematics
      vehicles_count: 8
      features: [presence, x, y, vx, vy, cos_h, sin_h]
      absolute: false
      normalize: true
    action:
      type: DiscreteMetaAction
    controlled_vehicles: 1
    vehicles_count: 20
    duration: 40
    simulation_frequency: 15
    policy_frequency: 5
    collision_reward: -5.0
    right_lane_reward: 0.05
    high_speed_reward: 0.3
    lane_change_reward: 0.05
    reward_speed_range: [18.0, 28.0]
seed: 0
desired_speed: 20.0
success_reward_threshold: 8.0
progress_min_distance: 80.0
eval_episodes: 5
