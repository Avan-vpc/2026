algo:
  policy: MlpPolicy
  learning_rate: 3.0e-4
  n_steps: 1024
  batch_size: 64
  n_epochs: 10
  gamma: 0.8
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
runtime:
  smoke_timesteps: 20000
  total_timesteps: 100000
  seeds: [0, 1, 2]
  eval_freq: 5000
  checkpoint_eval_episodes: 20
  final_eval_episodes: 200
  deterministic_eval: true
env:
  id: highway-fast-v0
  config: {}
seed: 0
gif_fps: 15
