env:
  id: highway-v0
  config:
    observation:
      type: Kinematics
      vehicles_count: 8
      features: [presence, x, y, vx, vy, cos_h, sin_h]
      absolute: false
      normalize: true
    action:
      type: DiscreteMetaAction
    lanes_count: 4
    vehicles_count: 25
    controlled_vehicles: 1
    duration: 40
    simulation_frequency: 15
    policy_frequency: 5
    ego_spacing: 2
    collision_reward: -5.0
    right_lane_reward: 0.1
    high_speed_reward: 0.4
    lane_change_reward: 0.05
    reward_speed_range: [20.0, 30.0]
seed: 0
desired_speed: 22.0
success_reward_threshold: 12.0
progress_min_distance: 120.0
eval_episodes: 5
